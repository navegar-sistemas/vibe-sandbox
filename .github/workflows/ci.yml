name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-dockerfile:
    name: hadolint (Dockerfile lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: hadolint Dockerfile.sandbox
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.sandbox
          config: .hadolint.yaml
          failure-threshold: warning

      - name: hadolint Dockerfile.sandbox.override.example
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile.sandbox.override.example
          config: .hadolint.yaml
          failure-threshold: warning

  lint-compose:
    name: docker compose config (validate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate base compose
        run: docker compose -f docker-compose.sandbox.yml config --quiet

      - name: Validate override example merges cleanly
        run: |
          cp docker-compose.override.example.yml docker-compose.override.yml
          docker compose -f docker-compose.sandbox.yml -f docker-compose.override.yml config --quiet

  lint-markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          globs: "**/*.md"

  scan-secrets:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-smoke:
    name: build base image + smoke test
    runs-on: ubuntu-latest
    needs: [lint-dockerfile, lint-compose]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build vibe-sandbox-base image
        run: docker compose -f docker-compose.sandbox.yml build

      - name: Smoke test - required tools are on PATH
        run: |
          docker run --rm --entrypoint bash vibe-sandbox-base:latest -c '
            set -e
            node --version
            git --version
            python3 --version
            curl --version | head -n 1
            id -un | grep -qx sandbox || { echo "container is not running as the sandbox user"; exit 1; }
          '

      - name: Smoke test - security defaults are applied
        run: |
          OUT=$(docker run --rm \
            --user 1000:1000 \
            --cap-drop=ALL \
            --security-opt=no-new-privileges:true \
            --pids-limit=256 \
            vibe-sandbox-base:latest \
            bash -c 'cat /proc/self/status | grep -E "^(CapEff|NoNewPrivs)"')
          echo "$OUT"
          echo "$OUT" | grep -q "^NoNewPrivs:.*1$" || { echo "no-new-privileges not active"; exit 1; }
          echo "$OUT" | grep -q "^CapEff:.*0000000000000000$" || { echo "capabilities not dropped"; exit 1; }
