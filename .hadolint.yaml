# Treat warnings as failures, consistent with the repository-wide rule
# that warnings constitute defects of the same severity as errors
# (see .claude/CLAUDE.md, "Warnings constitute defects").
failure-threshold: warning

ignored:
  # DL3008 (pin apt versions): not enforced. The base image tracks
  # Debian-slim's APT cache; pinning every apt-get install would require
  # a coordinated upgrade workflow that is not justified for a template
  # whose explicit purpose is to be cloned, customized, and re-built
  # frequently.
  - DL3008
  # DL3007 (use of `:latest` tag): not enforced for the override layer.
  # `Dockerfile.sandbox.override.example` starts with `FROM
  # sandbox-vibe-base:latest`, where `sandbox-vibe-base` is a tag that
  # this very template produces locally during `docker compose build`.
  # It is not a public registry image, so pinning a digest is neither
  # possible (the digest changes on every rebuild) nor useful.
  - DL3007

override:
  warning:
    - DL3007
    - DL3015
    - DL3009
